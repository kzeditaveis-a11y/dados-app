    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      max-width: 100vw;
      overflow-x: hidden;
    }

    .roboto-regular {
      font-family: "Roboto", sans-serif;
      font-weight: 400;
      font-style: normal; 
    }

    .roboto-medium {
      font-family: "Roboto", sans-serif;
      font-weight: 500; 
      font-style: normal;
    }

    .roboto-bold {
      font-family: "Roboto", sans-serif;
      font-weight: 700;
      font-style: normal;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      background: #96CA71;
      width: 100%;
      height: fit-content;
      padding: .8rem 1rem;

      >div {
        display: flex;
        justify-content: start;
        gap: 2rem;
        flex: 1;

        h1 {
          color: #FFFEFF;
          font-size: 1.4rem;
        }
      }
    }

    .form {
      display: flex;
      align-items: center;
      flex-direction: column;
      width: 100%;
      height: 100%;
      gap: 1rem;

      label {
        display: flex;
        flex-direction: column;
        gap: .4rem;
        width: 100%;
        max-width: 90vw;

        p {
          font-size: .8rem;
          color: #609D46;
        }

        strong {
          min-height: 1.4rem;
          font-size: 1.2rem;
          overflow: hidden;
          text-transform: uppercase;
          border-bottom: #A8A8A860 solid 1px;
        }
      }
    }

    .spinner-container {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      border: 16px solid #f3f3f3;
      border-radius: 50%;
      border-top: 16px solid #609D46;
      width: 8rem;
      height: 8rem;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>

</head>

  <script>
    // Esse é o script que já estava no seu arquivo
    const mainDiv = document.querySelector(".roboto-regular");
    if (false) { // Mantido igual ao seu
      mainDiv.innerHTML = '';
      mainDiv.className = "spinner-container"
      const spinner = document.createElement('div');
      spinner.className = 'spinner';
      mainDiv.appendChild(spinner);
    }

    // 🔥 TRUQUE MÁGICO AQUI:
    // Ele lê a letra (D ou P) e troca pela palavra inteira na tela do celular
    document.addEventListener("DOMContentLoaded", function() {
        const campoPermissao = document.getElementById("texto-permissao");
        if (campoPermissao) {
            const valor = campoPermissao.innerText.trim().toUpperCase();
            if (valor === "D") {
                campoPermissao.innerText = "DEFINITIVA";
            } else if (valor === "P") {
                campoPermissao.innerText = "PERMISSAO";
            }
        }
    });
  </script>
